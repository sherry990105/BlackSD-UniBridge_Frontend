<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniBridge - 공지사항 상세</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/header.css" />
  <link rel="stylesheet" href="./assets/css/footer.css" />
  <link rel="stylesheet" href="./assets/css/announceBoardDetail.css" />
</head>
<body>

  <!-- 헤더 -->
  <div id="headerContainer"></div>

  <!-- 공지사항 상세 본문 -->
  <div class="pageContent">
    <div class="announceDetailWrap">

      <!-- 제목 영역 -->
      <div class="announceDetailHeader">
        <span class="announceDetailBadge">유형</span>
        <h1 class="announceDetailTitle">글제목</h1>
      </div>

      <!-- 메타 정보 -->
      <div class="announceDetailMeta">
        <span class="announceDetailAuthor">작성자</span>
        <span class="announceDetailViews">조회수 0</span>
      </div>

      <!-- 본문 -->
      <div class="announceDetailBody">
        글 내용
      </div>

      <!-- 목록 버튼 -->
      <button class="announceDetailBackBtn" id="announceDetailBackBtn">글목록</button>

    </div>
  </div>

  <!-- 푸터 -->
  <div id="footerContainer"></div>

  <script src="./assets/js/headerComponent.js"></script>
  <script src="./assets/js/announceBoardDetail.js"></script>

</body>
</html>
