<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/assets/css/user/siginUp/signUp.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/header.css" />
    <link rel="stylesheet" href="./assets/css/footer.css" />
    <script defer src="/assets/js/user/siginUp/siginUp.js"></script>
</head>

<body>
    
    <div id="headerContainer"></div>

    <main>
        <div class="content">
            <div class="signUpBox">
                <div class="signUpText">회원가입</div>

                <form action="" id="signUp">
                    <div class="input-group">
                        <label>아이디</label>
                        <input type="text" class="userInput">
                        <button class="duplication">중복확인</button>
                    </div>

                    <div class="input-group">
                        <label>비밀번호</label>
                        <input type="password" class="userInput">
                        <div class="spacer"></div>
                    </div>

                    <div class="input-group">
                        <label>비밀번호 확인</label>
                        <input type="password" class="userInput">
                        <button class="duplication">확인</button>
                    </div>

                    <div class="input-group">
                        <label>이름</label>
                        <input type="text" class="userInput">
                        <div class="spacer"></div>
                    </div>

                    <div class="input-group">
                        <label>닉네임</label>
                        <input type="text" class="userInput">
                        <button class="duplication">중복확인</button>
                    </div>

                    <div class="input-group">
                        <label>전화번호</label>
                        <input type="text" class="userInput">
                        <button class="duplication">인증발송</button>
                    </div>

                    <div class="input-group">
                        <label>인증번호</label>
                        <input type="text" class="userInput">
                        <button class="duplication">인증확인</button>
                    </div>

                    <div class="input-group">
                        <label>성벌</label>
                        남성 <input type='radio' name='gender' value='male' />
                        여성 <input type='radio' name='gender' value='female' />
                        선택안함 <input type='radio' name='gender' value='none' />
                    </div>
                    <button class="signUpBtn">회원가입</button>
                </form>
            </div>
        </div>
    </main>
    <div id="footerContainer"></div>

    <script src="./assets/js/header.js"></script>
    <script src="./assets/js/footer.js"></script>
</body>

</html>
