<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멘토 설문조사t</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/frontend/assets/css/header.css" />
    <link rel="stylesheet" href="/frontend/assets/css/footer.css" />
    <link rel="stylesheet" href="/frontend/assets/css/user/mentor/myPage/userSurvey/userSurvey.css">
    <script defer src="/frontend/assets/js/user/mentor/myPage/userSurvey/userSurvey.js"></script>
</head>
<body>
    
    <div id="headerContainer"></div>

    <div class="main-container">
        <aside>
            <div class="myPageTitle">마이페이지</div>
            <ul>
                <li><a href="/frontend/html/user/mentor/myPage/myPage.html">계정 관리</a></li>
                <li><a href="/frontend/html/user/mentor/myPage/userSurvey/userSurvey.html" class="active">설문 조사</a></li>
                <li><a href="/frontend/html/user/mentor/myPage/userMatching/userMatching.html">매칭 정보</a></li>
                <li><a href="/frontend/html/user/mentor/myPage/userMentoCreate/mentoringView.html">멘토링</a></li>
                <li><a href="/frontend/html/user/mentor/myPage/userDelete/userDelete.html">회원 탈퇴</a></li>
            </ul>
        </aside>
        <main>
            <div class="userManage-title">
                <img src="/frontend/assets/img/user/userMyPageImg/userManage.jpg" alt="프로필 아이콘">
                <div class="title">설문조사</div>
            </div>
            <div class="userTypeBox">
                <div class="userItem">
                    <label>멘토/멘티</label>
                    <div class="userValue">멘토</div>
                </div>
                <div class="userItem"></div> <div class="userItem">
                    <label>대학</label>
                    <div class="userValue">한국 대학교</div>
                </div>
                <div class="userItem">
                    <label>졸업학점</label>
                    <div class="userValue">4.0</div>
                </div>

                <div class="userItem">
                    <label>교육과목</label>
                    <div class="userValue">Java</div>
                </div>
                <div class="userItem">
                    <label>전공</label>
                    <div class="userValue">컴퓨터 공학</div>
                </div>
            </div>
            <button id="userWriteBtn">재작성</button>
            <div id="surveyModal" class="modal">
                <div class="modal-content">
                    <button class="closeBtn"><img src="/frontend/assets/img/user/userProfile/close.png" alt=""></button>
                    <div class="surveyTitle">설문 조사</div>
                    <div class="modalBox">
                        <form>
                            <div class="input-row">
                                <label>멘토/멘티</label>
                                <div class="radio-group">
                                    <label class="radio-item">
                                        <span>멘토</span> <input type="radio" value="mentor" name="role" class="radioUserType" checked> 
                                    </label>
                                    <label class="radio-item">
                                        <span>멘티</span> <input type="radio" value="mentee" name="role" class="radioUserType"> 
                                    </label>
                                </div>
                            </div>
                            <div id="mentorContent" class="mentorContentList" style="display: block;">
                                <div class="input-row">
                                    <label>대학</label>
                                    <input type="text" class="modal-input">
                                </div>
        
                                <div class="input-row">
                                    <label>전공</label>
                                    <input type="text" class="modal-input">
                                </div>
        
                                <div class="input-row">
                                    <label>졸업학점</label>
                                    <input type="text" class="modal-input">
                                </div>
        
                                <div class="input-row">
                                    <label>교육과목</label>
                                    <select class="modal-select">
                                        <option value="" disabled selected>선택해 주세요</option>
                                        <option value="korean">국어</option>
                                        <option value="english">영어</option>
                                        <option value="math">수학</option>
                                        <option value="C">C언어</option>
                                        <option value="java">JAVA</option>
                                        <option value="cplus">C++</option>
                                        <option value="python">Python</option>
                                        <option value="game">게임</option>
                                    </select>
                                </div>
                            </div>

                            <div id="menteeContent" class="menteeContentList" style="display: none;">
                                <div class="input-row">
                                    <label>희망 과목</label>
                                    <select class="modal-select">
                                        <option value="" disabled selected>선택해 주세요</option>
                                        <option value="korean">국어</option>
                                        <option value="english">영어</option>
                                        <option value="math">수학</option>
                                        <option value="C">C언어</option>
                                        <option value="java">JAVA</option>
                                        <option value="cplus">C++</option>
                                        <option value="python">Python</option>
                                        <option value="game">게임</option>
                                    </select>
                                </div>
        
                                <div class="input-row">
                                    <label>학교</label>
                                    <input type="text" class="modal-input">
                                </div>
        
                                <div class="input-row">
                                    <label>학년</label>
                                    <input type="text" class="modal-input">
                                </div>
        
                                <div class="input-row">
                                    <label>희망 대학</label>
                                    <input type="text" class="modal-input">
                                </div>

                                <div class="input-row">
                                    <label>희망 전공</label>
                                    <input type="text" class="modal-input">
                                </div>
                            </div>

                            <div class="file-attach-section">
                                <p class="file-label">파일 첨부</p>
                                <div class="file-input-wrapper">
                                    <input type="file" id="surveyFile" accept=".pdf, .xlsx, .xls, .doc, .docx, .jpg, .png" onchange="updateFileName()">
                                    
                                    <div class="fake-file-input">
                                        <label for="surveyFile" id="fileSelector" class="file-select-btn">파일 선택</label>
                                        
                                        <label for="surveyFile" id="fileInfoDisplay" class="file-info-active" style="display: none;">
                                            <img src="/frontend/assets/img/user/file-icon.png" alt="파일" class="file-icon">
                                            <span id="fileNameDisplay" class="file-name-text"></span>
                                        </label>
                                    </div>
                                </div>
                            </div>
    
                            <div class="modal-footer">
                                <button type="button" class="submitBtn" id="sumbitBtn">작성 완료</button>
                                <button type="button" class="cancelBtn" id="closeModalBtn">취소</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </main>
        
    </div>

    <script src="/frontend/assets/js/header.js"></script>
    <script src="/frontend/assets/js/footer.js"></script>
</body>
</html>
